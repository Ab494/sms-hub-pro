# render.yaml — Render deployment config
# All secret values are managed in Render dashboard, NOT here

services:
  - type: web
    name: sms-hub-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://254convexcomltd.africa
      - key: CORS_ORIGINS
        value: https://254convexcomltd.africa,https://www.254convexcomltd.africa,https://convex-sms.vercel.app
      # These are set in Render dashboard — never hardcode secrets here
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BLESSEDTEXTS_API_KEY
        sync: false
      - key: BLESSEDTEXTS_SENDER
        value: FERRITE
      - key: DEFAULT_SENDER_ID
        value: FERRITE
      - key: SMS_COST_PER_UNIT
        value: 0.46
